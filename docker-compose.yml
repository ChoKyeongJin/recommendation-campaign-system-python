services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: campaign_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campaign_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  python:
    build: .
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: campaign_normalization_terms
      QDRANT_RAG_COLLECTION: campaign_user_rag_nodes
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: campaign_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      # 실제 business DB(SELECT 전용)와 전용 메타데이터 DB는 .env 의 BUSINESS_DB_* /
      # METADATA_DB_* 로 지정한다(env_file 로 자동 주입, 미지정 시 POSTGRES_* 폴백).
    volumes:
      - .:/app
    depends_on:
      - qdrant
    tty: true
    stdin_open: true
    command: python -c "import time; time.sleep(10**9)"

  api:
    build: .
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: campaign_normalization_terms
      QDRANT_RAG_COLLECTION: campaign_user_rag_nodes
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: campaign_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      # 실제 business DB(SELECT 전용)와 전용 메타데이터 DB는 .env 의 BUSINESS_DB_* /
      # METADATA_DB_* 로 지정한다(env_file 로 자동 주입, 미지정 시 POSTGRES_* 폴백).
    volumes:
      - .:/app
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
  qdrant_storage:
